apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fanvault-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: fanvault
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: fanvault

  source:
    repoURL: https://github.com/<your-org>/<your-repo>.git
    targetRevision: main
    path: hipstershop-micro-apps
    helm:
      releaseName: fanvault-apps
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   # Namespace created by infra chart
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
