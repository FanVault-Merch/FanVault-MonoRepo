apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# FanVault Full Stack Kustomize Manifest
#
# Deploy order (Kustomize applies resources in the order listed below):
#   1. Namespaces
#   2. Secrets
#   3. ConfigMaps
#   4. Services
#   5. Deployments
#   6. NetworkPolicies
#   7. Gateway
#   8. HTTPRoutes
#
# Usage:
#   kubectl apply -k k8s-manifests/
#
# Dry-run:
#   kubectl apply -k k8s-manifests/ --dry-run=client
#
# Delete everything:
#   kubectl delete -k k8s-manifests/

resources:
  - namespaces/backend.yaml
  - namespaces/frontend.yaml

  - secrets/auth-service-secret.yaml
  - secrets/user-service-secret.yaml
  - secrets/product-service-secret.yaml
  - secrets/order-service-secret.yaml
  - secrets/email-service-secret.yaml

  - configmaps/auth-service-cm.yaml
  - configmaps/user-service-cm.yaml
  - configmaps/product-service-cm.yaml
  - configmaps/order-service-cm.yaml
  - configmaps/email-service-cm.yaml
  - configmaps/frontend-cm.yaml

  - services/auth-service-svc.yaml
  - services/user-service-svc.yaml
  - services/product-service-svc.yaml
  - services/order-service-svc.yaml
  - services/email-service-svc.yaml
  - services/frontend-svc.yaml

  - deployments/email-service-deploy.yaml
  - deployments/auth-service-deploy.yaml
  - deployments/user-service-deploy.yaml
  - deployments/product-service-deploy.yaml
  - deployments/order-service-deploy.yaml
  - deployments/frontend-deploy.yaml

  # - network-policies/auth-service-netpol.yaml
  # - network-policies/user-service-netpol.yaml
  # - network-policies/product-service-netpol.yaml
  # - network-policies/order-service-netpol.yaml
  # - network-policies/email-service-netpol.yaml
  # - network-policies/frontend-netpol.yaml

  - gateway/gateway.yaml
  - gateway/auth-httproute.yaml
  - gateway/user-httproute.yaml
  - gateway/product-httproute.yaml
  - gateway/order-httproute.yaml
  - gateway/email-httproute.yaml
  - gateway/frontend-httproute.yaml
