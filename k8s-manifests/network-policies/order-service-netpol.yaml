# ── order-service NetworkPolicy ───────────────────────────────────────────────
# Also allows egress to RabbitMQ (port 5672) in addition to MongoDB
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-service-netpol
  namespace: backend
  labels:
    app.kubernetes.io/name: order-service
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: order-service
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - protocol: TCP
          port: 3004
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3004

  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: db
      ports:
        - protocol: TCP
          port: 27017
        - protocol: TCP
          port: 5672
    # Allow call to email-service within the same namespace
    - to:
        - podSelector: {}
