# ── auth-service NetworkPolicy ────────────────────────────────────────────────
# Default deny-all; explicitly allow:
#   Ingress: from kgateway pods
#   Egress:  to MongoDB, RabbitMQ (db ns), same-namespace pods, kube-dns
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-netpol
  namespace: backend
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kgateway-system
      ports:
        - protocol: TCP
          port: 3001
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 3001

  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: db
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector: {}
