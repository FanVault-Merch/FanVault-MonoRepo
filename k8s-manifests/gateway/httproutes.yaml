# ── HTTPRoutes for all services ───────────────────────────────────────────────
# Each --- document is a separate HTTPRoute resource.
# The /api/<service> prefix is stripped before forwarding (URLRewrite).
# The frontend route catches everything else at /.

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: backend
  labels:
    app.kubernetes.io/component: gateway
spec:
  parentRefs:
    - name: fanvault-gateway
      namespace: backend
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: auth-service
          namespace: backend
          port: 3001

