apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.name | default "fanvault-gateway" }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gatewayClassName }}
  listeners:
    - name: http
      protocol: HTTP
      port: {{ .Values.listenerPort }}
      hostname: {{ .Values.listenerHostname | quote }}
      allowedRoutes:
        namespaces:
          from: Same
