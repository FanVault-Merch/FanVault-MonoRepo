{{/* All HTTPRoutes in a single file separated by --- */}}
{{- $ns   := .Values.namespace }}
{{- $gwName := .Values.name | default "fanvault-gateway" }}
{{- range .Values.routes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/component: httproute
    app.kubernetes.io/part-of: fanvault
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ $gwName }}
      namespace: {{ $ns }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .pathPrefix }}
      backendRefs:
        - name: {{ .serviceName }}
          namespace: {{ $ns }}
          port: {{ .servicePort }}
{{- end }}
