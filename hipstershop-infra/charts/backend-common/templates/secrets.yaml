{{/*
  Iterate over .Values.services and create one Secret per service.
  Uses stringData so Kubernetes handles base64 encoding automatically.
  DO NOT commit real secrets to Git — use Sealed Secrets / ESO in production.
*/}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.secret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-secret
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: {{ $.Values.partOf | default "fanvault" }}
    app.kubernetes.io/managed-by: Helm
type: Opaque
stringData:
  {{- range $k, $v := $svc.secret }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
