# ═══════════════════════════════════════════════════════════════════════
#  hipstershop-infra – Master Values File
#  Single source of truth for ALL infrastructure configuration.
# ═══════════════════════════════════════════════════════════════════════

# ── Global values (inherited by all sub-charts) ─────────────────────────
global:
  namespace: dev
  imageRegistry: docker.io
  imagePullPolicy: IfNotPresent
  partOf: fanvault
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ═══════════════════════════════════════════════════════════════════════
