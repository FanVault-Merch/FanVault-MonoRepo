# ═══════════════════════════════════════════════════════════════════════
#  gateway sub-chart values
# ═══════════════════════════════════════════════════════════════════════
gateway:
  namespace: dev
  name: fanvault-gateway
  role: dev-gateway
  gatewayClassName: kgateway
  listenerPort: 80
  listenerHostname: "*"

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

  # All HTTPRoutes defined here – rendered as a single multi-document YAML
  routes:
    - name: auth-route
      pathPrefix: /api/auth
      serviceName: auth-service
      servicePort: 3001
    - name: user-route
      pathPrefix: /api/users
      serviceName: user-service
      servicePort: 3002
    - name: product-route
      pathPrefix: /api/products
      serviceName: product-service
      servicePort: 3003
    - name: order-route
      pathPrefix: /api/orders
      serviceName: order-service
      servicePort: 3004
    - name: email-route
      pathPrefix: /api/email
      serviceName: email-service
      servicePort: 3005
    - name: frontend-route
      pathPrefix: /
      serviceName: frontend
      servicePort: 80

# ═══════════════════════════════════════════════════════════════════════
#  MongoDB – bitnami/mongodb sub-chart values
# ═══════════════════════════════════════════════════════════════════════
mongodb:
  architecture: replicaset
  replicaCount: 2

  auth:
    enabled: true
    rootUser: root
    rootPassword: "root@123"

  replicaSetName: rs0
  replicaSetHostnames: true

  # Add role label so NetworkPolicy podSelector works
  podLabels:
    role: dev-db
    app.kubernetes.io/part-of: fanvault

  service:
    type: ClusterIP
    port: 27017

  persistence:
    enabled: true
    storageClass: "nfs-fanvault"
    accessModes:
      - ReadWriteOnce
    size: 8Gi

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"

  arbiter:
    enabled: true

  pdb:
    create: true
    minAvailable: 1

  networkPolicy:
    enabled: false   # We manage NetworkPolicies via backend-common

# ═══════════════════════════════════════════════════════════════════════
#  RabbitMQ – bitnami/rabbitmq sub-chart values
# ═══════════════════════════════════════════════════════════════════════
rabbitmq:
  auth:
    username: root
    password: "root@123"
    erlangCookie: "FanVaultRabbitMQSecretCookie2025"

  replicaCount: 2

  # Add role label so NetworkPolicy podSelector works
  podLabels:
    role: dev-db
    app.kubernetes.io/part-of: fanvault

  service:
    type: ClusterIP
    port: 5672
    managerPort: 15672

  persistence:
    enabled: true
    storageClass: "nfs-fanvault"
    accessMode: ReadWriteOnce
    size: 4Gi

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  pdb:
    create: true
    minAvailable: 1

  networkPolicy:
    enabled: false   # We manage NetworkPolicies via backend-common

  extraConfiguration: |
    default_vhost = /
    default_permissions.configure = .*
    default_permissions.read = .*
    default_permissions.write = .*
