# ── frontend values ──────────────────────────────────────────────────────────
# Deployed via: helm install frontend ./microservice-base -f environments/frontend-values.yaml -n frontend

nameOverride: frontend
namespace: frontend

# ── Image ─────────────────────────────────────────────────
image:
  repository: savitxr/fanvault-frontend
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2
containerPort: 80

# ── Service ───────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80

# ── Non-sensitive config ──────────────────────────────────
# The frontend Nginx reverse-proxy routes /api/* to the gateway
config:
  API_BASE_URL: "http://fanvault-gateway.backend.svc.cluster.local"
  NODE_ENV: "production"

# ── No DB secrets needed for frontend ────────────────────
secret: {}

# ── Health Probes ─────────────────────────────────────────
# Nginx serves the index at /
probes:
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
    failureThreshold: 3
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# ── Resources ─────────────────────────────────────────────
resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

# ── Security Context ──────────────────────────────────────
securityContext:
  runAsNonRoot: false   # Nginx default image needs root to bind port 80
  runAsUser: 0
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# ── Network Policy ────────────────────────────────────────
networkPolicy:
  enabled: true
  gatewayNamespace: kgateway-system
  mongodb:
    port: 27017
  rabbitmq:
    port: 5672

# ── Gateway (disabled – shared gateway lives in backend namespace) ─────────────
gateway:
  enabled: false
  name: fanvault-gateway
  namespace: backend

# ── HTTPRoute for frontend (serves /) ────────────────────
httpRoute:
  enabled: true
  rules:
    - pathPrefix: /
      serviceName: frontend
      servicePort: 80
