# ── auth-service values ──────────────────────────────────────────────────────
# Deployed via: helm install auth ./microservice-base -f environments/auth-service-values.yaml -n backend

nameOverride: auth-service
namespace: backend

# ── Image ─────────────────────────────────────────────────
image:
  repository: savitxr/fanvault-auth
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2
containerPort: 3001

# ── Service ───────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3001

# ── Non-sensitive config ──────────────────────────────────
config:
  PORT: "3001"
  NODE_ENV: "production"
  SERVICE_NAME: "auth-service"
  JWT_EXPIRES_IN: "15m"
  JWT_REFRESH_EXPIRES_IN: "7d"

# ── Sensitive config (base64-encoded by Helm) ─────────────
# Replace placeholder values with real credentials before deploying.
secret:
  MONGODB_URI: "mongodb://fanvault_admin:FanVault_Secure_2025!@mongodb.db.svc.cluster.local:27017/auth-db?authSource=admin&replicaSet=rs0"
  JWT_SECRET: "0b849786adec5efb97547d99e6d76438cf37559eee750d23261abf614456a7dd0d07bb3d59560c20df4ece773a398b13"
  JWT_REFRESH_SECRET: "bf47b713587fa9c4a048e82a1f0051a12eda45094ef0bdb22dfcfdd19b441e8f88975d48019f83ecd1dc52426e074f1c"

# ── Health Probes ─────────────────────────────────────────
probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# ── Resources ─────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# ── Security Context ──────────────────────────────────────
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# ── Network Policy ────────────────────────────────────────
networkPolicy:
  enabled: true
  gatewayNamespace: kgateway-system
  mongodb:
    port: 27017
  rabbitmq:
    port: 5672

# ── Gateway (disabled – deployed once via gateway-values.yaml) ────────────────
gateway:
  enabled: false
  name: fanvault-gateway
  namespace: backend

# ── HTTPRoute ─────────────────────────────────────────────
httpRoute:
  enabled: false
