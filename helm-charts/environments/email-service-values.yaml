# ── email-service values ─────────────────────────────────────────────────────
# Deployed via: helm install email ./microservice-base -f environments/email-service-values.yaml -n backend

nameOverride: email-service
namespace: backend

# ── Image ─────────────────────────────────────────────────
image:
  repository: savitxr/fanvault-email
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2
containerPort: 3005

# ── Service ───────────────────────────────────────────────
service:
  type: ClusterIP
  port: 3005

# ── Non-sensitive config ──────────────────────────────────
config:
  PORT: "3005"
  NODE_ENV: "production"
  SERVICE_NAME: "email-service"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_FROM: "FanVault Store <jayabaaskar@gmail.com>"

# ── Sensitive config (base64-encoded by Helm) ─────────────
secret:
  RABBITMQ_URL: "amqp://fanvault_admin:FanVault_Secure_2025!@rabbitmq.db.svc.cluster.local:5672"
  INTERNAL_SECRET: "d742b8e49bb41080791928716d5b426bf135907ff3a5b7bcf7e89b5012b089d4"
  SMTP_USER: "jayabaaskar@gmail.com"
  SMTP_PASS: "moefitmxbruudot"

# ── Health Probes ─────────────────────────────────────────
probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

# ── Resources ─────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# ── Security Context ──────────────────────────────────────
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# ── Network Policy ────────────────────────────────────────
networkPolicy:
  enabled: true
  gatewayNamespace: kgateway-system
  mongodb:
    port: 27017
  rabbitmq:
    port: 5672

# ── Gateway / HTTPRoute ───────────────────────────────────
gateway:
  enabled: false
  name: fanvault-gateway
  namespace: backend

httpRoute:
  enabled: false
