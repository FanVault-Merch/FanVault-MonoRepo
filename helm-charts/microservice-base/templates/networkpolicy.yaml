{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "microservice.fullname" . }}-netpol
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "microservice.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic from kgateway pods in its dedicated namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.gatewayNamespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
    # Allow traffic from pods within the same namespace (inter-service)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}

  egress:
    # Allow DNS resolution via kube-dns
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow egress to MongoDB in the db namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: db
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.mongodb.port }}

    # Allow egress to RabbitMQ in the db namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: db
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.rabbitmq.port }}

    # Allow egress to pods within the same namespace (inter-service calls)
    - to:
        - podSelector: {}
{{- end }}
